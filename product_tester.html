<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Image Tester</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
header { background: #1a1a2e; color: #fff; padding: 24px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
h1 { font-size: 1.4rem; margin-bottom: 16px; font-weight: 600; }
.search-wrap { display: flex; gap: 8px; }
.search-wrap input { flex: 1; padding: 12px 16px; border: none; border-radius: 6px; font-size: 1rem; outline: none; }
.search-wrap button { padding: 12px 24px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; }
.search-wrap button:hover { background: #d63851; }
#summary { margin-top: 12px; font-size: 0.85rem; color: #aaa; }
#summary .ok { color: #4ecdc4; font-weight: 600; }
#summary .fail { color: #e94560; font-weight: 600; }
.tab-bar { display: flex; gap: 0; margin-top: 14px; }
.tab-bar button { padding: 10px 24px; background: rgba(255,255,255,0.1); border: none; color: #aaa; font-size: 0.9rem; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
.tab-bar button.active { color: #fff; background: rgba(255,255,255,0.15); border-bottom-color: #e94560; font-weight: 600; }
.tab-bar button:hover { color: #fff; }
main { padding: 24px 0; }
.card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.card-header { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 14px; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; color: #fff; }
.badge-odp { background: #2d6a4f; }
.badge-univ { background: #5a189a; }
.card-header .info { font-size: 0.9rem; color: #555; }
.card-header .info strong { color: #111; }
.thumb-section h4 { font-size: 0.8rem; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.thumb-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.thumb-row .thumb-item { text-align: center; }
.thumb-row .thumb-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 4px; border: 3px solid #ddd; transition: border-color 0.3s; }
.thumb-row .thumb-item img.loaded { border-color: #4ecdc4; }
.thumb-row .thumb-item img.errored { border-color: #e94560; }
.thumb-row .thumb-item .label { font-size: 0.65rem; color: #999; margin-top: 4px; }
.detail-toggle { background: #f0f0f0; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; color: #555; margin-top: 8px; }
.detail-toggle:hover { background: #e0e0e0; }
.detail-content { margin-top: 12px; display: none; border-top: 1px solid #eee; padding-top: 12px; }
.detail-content.open { display: block; }
.detail-content img { max-width: 100%; display: block; margin-bottom: 4px; border: 3px solid #ddd; border-radius: 4px; transition: border-color 0.3s; }
.detail-content img.loaded { border-color: #4ecdc4; }
.detail-content img.errored { border-color: #e94560; }
#failed-list { background: #fff; border-radius: 10px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
#failed-list h3 { color: #e94560; margin-bottom: 12px; font-size: 1rem; }
#failed-list ul { list-style: none; }
#failed-list li { font-size: 0.75rem; color: #888; padding: 4px 0; border-bottom: 1px solid #f5f5f5; word-break: break-all; }
.no-results { text-align: center; padding: 60px 20px; color: #999; font-size: 1.1rem; }

/* 딤 오버레이 */
#dim-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}
#dim-overlay .dim-title {
  color: #fff;
  font-size: 1.6rem;
  font-weight: 700;
}
#dim-overlay .dim-desc {
  color: #ccc;
  font-size: 1rem;
}
#dim-overlay .start-btn {
  padding: 16px 48px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
#dim-overlay .start-btn:hover {
  background: #d63851;
  transform: scale(1.03);
}
#dim-overlay .start-btn:active {
  transform: scale(0.97);
}
</style>
</head>
<body>
<div id="dim-overlay">
  <div class="dim-title">🧪 Product Image Tester</div>
  <div class="dim-desc">검증 시작 버튼을 눌러 전체 브랜드 이미지 검증을 시작하세요</div>
  <button class="start-btn" id="startTestBtn">검증 시작</button>
</div>
<header>
<div class="container">
<h1>🧪 Product Image Tester</h1>
<div class="search-wrap">
<input type="text" id="searchInput" placeholder="품번 검색 (예: OD263ILS01, ILS01, UV263)" />
<button id="searchBtn">Search</button>
</div>
<div id="summary"></div>
<div class="tab-bar">
<button class="active" id="tab-detail" onclick="switchTab('detail')">상품상세 테스트</button>
<button id="tab-thumb" onclick="switchTab('thumb')">썸네일 테스트</button>
</div>
</div>
</header>
<main class="container">
<div id="color-chips" style="display:none; margin-bottom:16px; padding:12px 16px; background:#fff; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.08);"></div>
<div id="failed-list" style="display:none;"><h3>❌ Failed URLs</h3><ul id="failedUrls"></ul></div>
<div id="results"><div class="no-results">품번을 입력하고 검색하세요</div></div>
</main>

<script>
// === DATA ===
const ODP_BASE = 'https://img.childy.kr/img/outdoor2026/odp26_FA/';
const UNIV_BASE = 'https://img.childy.kr/img/univ/univ26_FA/thum/';

const odpRaw = [
['OD263ILS01','BLU','멀티 스트라이프 티셔츠'],['OD263ILS01','NVY','멀티 스트라이프 티셔츠'],['OD263ILS01','BRN','멀티 스트라이프 티셔츠'],
['OD263ILS02','LKH','단스트라이프 티셔츠'],['OD263ILS02','DGY','단스트라이프 티셔츠'],
['OD263ILS03','BLU','배색 레이어드 티셔츠'],['OD263ILS03','BLK','배색 레이어드 티셔츠'],
['OD263ILS04','OWH','소매 그래픽 티셔츠'],['OD263ILS04','CML','소매 그래픽 티셔츠'],['OD263ILS04','MLG','소매 그래픽 티셔츠'],['OD263ILS04','BLK','소매 그래픽 티셔츠'],
['OD263ILS05','IVY','전면 그래픽 티셔츠'],['OD263ILS05','BLU','전면 그래픽 티셔츠'],['OD263ILS05','BLK','전면 그래픽 티셔츠'],
['OD263ILS06','MWH','백 그래픽 티셔츠'],['OD263ILS06','LGN','백 그래픽 티셔츠'],['OD263ILS06','DGY','백 그래픽 티셔츠'],
['OD263ILC07','BLU','멀티스트라이프 럭비티셔츠'],['OD263ILC07','BRN','멀티스트라이프 럭비티셔츠'],
['OD263ILS08','MUS','라글란 그래픽 티셔츠'],['OD263ILS08','DGY','라글란 그래픽 티셔츠'],['OD263ILS08','BLK','라글란 그래픽 티셔츠'],
['OD263IHD01','MWH','레이어드 후드티'],['OD263IHD01','KHA','레이어드 후드티'],
['OD263ILS09','OTM','베이직 긴팔티'],['OD263ILS09','MLG','베이직 긴팔티'],['OD263ILS09','GRY','베이직 긴팔티'],
['OD263IMM02','OTM','전면 그래픽 맨투맨'],['OD263IMM02','LBL','전면 그래픽 맨투맨'],['OD263IMM02','BLK','전면 그래픽 맨투맨'],
['OD263IMM03','CRE','백 그래픽 맨투맨'],['OD263IMM03','NVY','백 그래픽 맨투맨'],['OD263IMM03','MLG','백 그래픽 맨투맨'],
['OD263IZM04','BLU','컬러블록 반집맨투맨'],['OD263IZM04','PNK','컬러블록 반집맨투맨'],['OD263IZM04','BLK','컬러블록 반집맨투맨'],
['OD263IHD05','MLG','전면 그래픽 후드티'],['OD263IHD05','BLK','전면 그래픽 후드티'],
['OD263ISH06','BRN','플란넬 체크셔츠'],['OD263ISH06','NVY','플란넬 체크셔츠'],
['OD263BPT01','MLG','에센셜 조거팬츠'],['OD263BPT01','OTM','에센셜 조거팬츠'],['OD263BPT01','NVY','에센셜 조거팬츠'],['OD263BPT01','BLK','에센셜 조거팬츠'],
['OD263BPT02','LBE','커브드 저지팬츠'],['OD263BPT02','MLG','커브드 저지팬츠'],['OD263BPT02','BLK','커브드 저지팬츠'],
['OD263BPT03','MWH','카고 조거 저지팬츠'],['OD263BPT03','MLG','카고 조거 저지팬츠'],['OD263BPT03','DGY','카고 조거 저지팬츠'],
['OD263BPT04','OTM','배색 스트레이트 저지팬츠'],['OD263BPT04','BRN','배색 스트레이트 저지팬츠'],['OD263BPT04','BLK','배색 스트레이트 저지팬츠'],
['OD263BPT05','BEI','세미배기 우븐팬츠'],['OD263BPT05','CHC','세미배기 우븐팬츠'],
['OD263BPT06','BRN','카고 우븐팬츠'],['OD263BPT06','KHA','카고 우븐팬츠'],['OD263BPT06','BLK','카고 우븐팬츠'],
['OD263BPT07','CRE','코듀로이 카고팬츠'],['OD263BPT07','DBL','코듀로이 카고팬츠'],['OD263BPT07','DGY','코듀로이 카고팬츠'],
['OD263IZM71','MLG','여아 반집 맨투맨'],['OD263IZM71','OTM','여아 반집 맨투맨'],
['OD263IMM72','BRN','여아 그래픽 크롭 맨투맨'],['OD263IMM72','BLK','여아 그래픽 크롭 맨투맨'],
['OD263IHZ73','PNK','여아 벨로아 후드집업'],['OD263IHZ73','MLG','여아 벨로아 후드집업'],
['OD263BPT73','PNK','여아 벨로아 팬츠'],['OD263BPT73','MLG','여아 벨로아 팬츠'],
['OD263IHD75','MLG','여아 크롭 후드티셔츠'],['OD263IHD75','OTM','여아 크롭 후드티셔츠'],
['OD263BPT74','MLG','여아 백그래픽 저지팬츠'],['OD263BPT74','OTM','여아 백그래픽 저지팬츠']
];

const univRaw = [
['UV263ILS01','MLG','유니 로고 긴팔티셔츠'],['UV263ILS01','IVY','유니 로고 긴팔티셔츠'],['UV263ILS01','NVY','유니 로고 긴팔티셔츠'],
['UV263ILS02','OWH','크랙 백그래픽 긴팔티셔츠'],['UV263ILS02','BLK','크랙 백그래픽 긴팔티셔츠'],['UV263ILS02','CHC','크랙 백그래픽 긴팔티셔츠'],
['UV263IZM03','OTM','헨리넥 아치 맨투맨'],['UV263IZM03','GRN','헨리넥 아치 맨투맨'],
['UV263IMM04','MLG','래글런 그래픽 맨투맨'],['UV263IMM04','NVY','래글런 그래픽 맨투맨'],
['UV263IHD05','IVY','클럽 그래픽 후드'],['UV263IHD05','KHA','클럽 그래픽 후드'],
['UV263BPT01','MWH','베이직 로고 조거팬츠'],['UV263BPT01','NVY','베이직 로고 조거팬츠'],
['UV263BPT02','MLG','베이직 로고 커브드팬츠'],['UV263BPT02','BLK','베이직 로고 커브드팬츠']
];

// Build product data
const products = [];

odpRaw.forEach((r, i) => {
  const [pum, color, name] = r;
  products.push({
    table: 'ODP', id: i + 1, pum, color, name,
    erpAll: ODP_BASE + pum + '_ALL.jpg',
    erp: ODP_BASE + pum + '_' + color + '.jpg',
    s750: ODP_BASE + pum + '_' + color + '_750.jpg',
    s800: ODP_BASE + pum + '_' + color + '_800.jpg',
    s960: ODP_BASE + pum + '_' + color + '_960.jpg',
    s1000: ODP_BASE + pum + '_' + color + '_1000.jpg',
    s1500: ODP_BASE + pum + '_' + color + '_1500.jpg',
    detailUrls: [
      'https://img.childy.kr/img/outdoor2023/notice/top_notice_odp.jpg',
      'https://img.childy.kr/img/outdoor2026/odp26_FA/2026FA_intro.jpg',
      ODP_BASE + pum + '_txt.jpg',
      ODP_BASE + pum + '_' + color + '_model.jpg',
      ODP_BASE + pum + '_' + color + '_prd.jpg',
      ODP_BASE + pum + '_' + color + '_detail.jpg',
      'https://img.childy.kr/img/outdoor2024/odp24_FA/kc.jpg',
      'https://img.childy.kr/img/outdoor2026/odp26_FA/modelspec.jpg',
      'https://img.childy.kr/img/outdoor2024/odp24_FA/size.jpg',
      ODP_BASE + pum + '_size.jpg',
      ODP_BASE + pum + '_check.jpg',
      'https://img.childy.kr/img/outdoor2024/odp24_SP/washingtip.jpg',
      'https://img.childy.kr/img/outdoor2024/odp24_SP/delivery.jpg'
    ]
  });
});

const UNIV_DETAIL_BASE = 'https://img.childy.kr/img/univ/univ26_FA/';
univRaw.forEach((r, i) => {
  const [pum, color, name] = r;
  products.push({
    table: 'UNIV', id: i + 1, pum, color, name,
    erpAll: UNIV_BASE + pum + '_ALL.jpg',
    erp: UNIV_BASE + pum + '_' + color + '.jpg',
    s750: UNIV_BASE + pum + '_' + color + '_750.jpg',
    s800: UNIV_BASE + pum + '_' + color + '_800.jpg',
    s960: UNIV_BASE + pum + '_' + color + '_960.jpg',
    s1000: UNIV_BASE + pum + '_' + color + '_1000.jpg',
    s1500: UNIV_BASE + pum + '_' + color + '_1500.jpg',
    detailUrls: [
      UNIV_DETAIL_BASE + 'top_notice_univ.jpg',
      UNIV_DETAIL_BASE + 'intro_26fw.jpg',
      UNIV_DETAIL_BASE + pum + '_txt.jpg',
      UNIV_DETAIL_BASE + pum + '_model.jpg',
      UNIV_DETAIL_BASE + pum + '_' + color + '_model.jpg',
      UNIV_DETAIL_BASE + pum + '_' + color + '_detail.jpg',
      UNIV_DETAIL_BASE + pum + '_info.jpg',
      UNIV_DETAIL_BASE + pum + '_size.jpg',
      UNIV_DETAIL_BASE + 'modelspec.jpg',
      UNIV_DETAIL_BASE + 'sizeguide.jpg',
      UNIV_DETAIL_BASE + 'kc.jpg',
      UNIV_DETAIL_BASE + 'washingtip.jpg',
      UNIV_DETAIL_BASE + 'delivery.jpg'
    ]
  });
});

// === LOGIC ===
let totalImages = 0;
let loadedCount = 0;
let failedCount = 0;
const failedUrls = [];

function updateSummary() {
  const el = document.getElementById('summary');
  el.innerHTML = `총 이미지: ${totalImages} | <span class="ok">✓ ${loadedCount}</span> | <span class="fail">✗ ${failedCount}</span>`;
}

function trackImage(img) {
  totalImages++;
  img.addEventListener('load', () => { img.classList.add('loaded'); loadedCount++; updateSummary(); });
  img.addEventListener('error', () => { img.classList.add('errored'); failedCount++; failedUrls.push(img.src); updateSummary(); showFailed(); });
}

function showFailed() {
  const container = document.getElementById('failed-list');
  const ul = document.getElementById('failedUrls');
  if (failedUrls.length > 0) {
    container.style.display = 'block';
    ul.innerHTML = failedUrls.map(u => `<li>${u}</li>`).join('');
  }
}

function search(query) {
  // Reset
  totalImages = 0; loadedCount = 0; failedCount = 0; failedUrls.length = 0;
  document.getElementById('failed-list').style.display = 'none';
  document.getElementById('failedUrls').innerHTML = '';
  updateSummary();

  const q = query.trim().toUpperCase();
  if (!q) { document.getElementById('results').innerHTML = '<div class="no-results">품번을 입력하고 검색하세요</div>'; document.getElementById('color-chips').style.display = 'none'; return; }

  const matches = products.filter(p => p.pum.toUpperCase().includes(q) || p.name.toUpperCase().includes(q) || p.color.toUpperCase().includes(q));

  if (matches.length === 0) {
    document.getElementById('results').innerHTML = '<div class="no-results">검색 결과가 없습니다</div>';
    document.getElementById('color-chips').style.display = 'none';
    return;
  }

  // Show color chips
  const chipsEl = document.getElementById('color-chips');
  const colors = matches.map(p => p.color);
  const pums = [...new Set(matches.map(p => p.pum))];
  chipsEl.style.display = 'block';
  chipsEl.innerHTML = `<span style="font-size:0.8rem;color:#888;margin-right:8px;">검색결과 ${matches.length}건 | 컬러:</span>` +
    colors.map(c => `<span style="display:inline-block;padding:4px 10px;margin:3px;background:#263238;color:#fff;border-radius:4px;font-size:0.8rem;font-weight:600;">${c}</span>`).join('') +
    (pums.length > 1 ? `<span style="display:block;margin-top:6px;font-size:0.75rem;color:#999;">품번: ${pums.join(', ')}</span>` : '');

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  matches.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'card';

    const badgeClass = p.table === 'ODP' ? 'badge-odp' : 'badge-univ';
    const tableName = p.table === 'ODP' ? '아웃도어프로덕츠 (2179)' : '유니버셜오버롤 (2182)';

    card.innerHTML = `
      <div class="card-header">
        <span class="badge ${badgeClass}">${p.table}</span>
        <span class="info"><strong>${p.name}</strong> | 품번: ${p.pum} | 컬러: ${p.color} | ${tableName}</span>
      </div>
      ${currentTab === 'thumb' ? `
      <div class="thumb-section">
        <h4>Thumbnails</h4>
        <div class="thumb-row">
          <div class="thumb-item"><img src="${p.erpAll}" alt="ERP_ALL" /><div class="label">ERP_ALL</div></div>
          <div class="thumb-item"><img src="${p.erp}" alt="ERP" /><div class="label">ERP</div></div>
          <div class="thumb-item"><img src="${p.s750}" alt="750" /><div class="label">750</div></div>
          <div class="thumb-item"><img src="${p.s800}" alt="800" /><div class="label">800</div></div>
          <div class="thumb-item"><img src="${p.s960}" alt="960" /><div class="label">960</div></div>
          <div class="thumb-item"><img src="${p.s1000}" alt="1000" /><div class="label">1000</div></div>
          <div class="thumb-item"><img src="${p.s1500}" alt="1500" /><div class="label">1500</div></div>
        </div>
      </div>
      ` : `
      <div class="detail-content open">
        ${p.detailUrls.map(u => `<img src="${u}" alt="detail" />`).join('')}
      </div>
      `}
    `;

    resultsEl.appendChild(card);

    // Track all images
    card.querySelectorAll('img').forEach(trackImage);
  });

  updateSummary();
}

// Event listeners
document.getElementById('searchBtn').addEventListener('click', () => search(document.getElementById('searchInput').value));
document.getElementById('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') search(e.target.value); });

// 검증 시작 버튼
document.getElementById('startTestBtn').addEventListener('click', () => {
  document.getElementById('dim-overlay').style.display = 'none';
  // 전체 브랜드 검증 시작 - 빈 쿼리로 전체 검색
  searchAll();
});

function searchAll() {
  // Reset
  totalImages = 0; loadedCount = 0; failedCount = 0; failedUrls.length = 0;
  document.getElementById('failed-list').style.display = 'none';
  document.getElementById('failedUrls').innerHTML = '';
  updateSummary();

  const matches = products;

  // Show color chips
  const chipsEl = document.getElementById('color-chips');
  const colors = [...new Set(matches.map(p => p.color))];
  const pums = [...new Set(matches.map(p => p.pum))];
  chipsEl.style.display = 'block';
  chipsEl.innerHTML = `<span style="font-size:0.8rem;color:#888;margin-right:8px;">전체 검증: ${matches.length}건 | 컬러 종류: ${colors.length}개</span>` +
    `<span style="display:block;margin-top:6px;font-size:0.75rem;color:#999;">품번: ${pums.length}개</span>`;

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  matches.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'card';

    const badgeClass = p.table === 'ODP' ? 'badge-odp' : 'badge-univ';
    const tableName = p.table === 'ODP' ? '아웃도어프로덕츠 (2179)' : '유니버셜오버롤 (2182)';

    card.innerHTML = `
      <div class="card-header">
        <span class="badge ${badgeClass}">${p.table}</span>
        <span class="info"><strong>${p.name}</strong> | 품번: ${p.pum} | 컬러: ${p.color} | ${tableName}</span>
      </div>
      ${currentTab === 'thumb' ? `
      <div class="thumb-section">
        <h4>Thumbnails</h4>
        <div class="thumb-row">
          <div class="thumb-item"><img src="${p.erpAll}" alt="ERP_ALL" /><div class="label">ERP_ALL</div></div>
          <div class="thumb-item"><img src="${p.erp}" alt="ERP" /><div class="label">ERP</div></div>
          <div class="thumb-item"><img src="${p.s750}" alt="750" /><div class="label">750</div></div>
          <div class="thumb-item"><img src="${p.s800}" alt="800" /><div class="label">800</div></div>
          <div class="thumb-item"><img src="${p.s960}" alt="960" /><div class="label">960</div></div>
          <div class="thumb-item"><img src="${p.s1000}" alt="1000" /><div class="label">1000</div></div>
          <div class="thumb-item"><img src="${p.s1500}" alt="1500" /><div class="label">1500</div></div>
        </div>
      </div>
      ` : `
      <div class="detail-content open">
        ${p.detailUrls.map(u => `<img src="${u}" alt="detail" />`).join('')}
      </div>
      `}
    `;

    resultsEl.appendChild(card);
    card.querySelectorAll('img').forEach(trackImage);
  });

  updateSummary();
}

let currentTab = 'detail';
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-thumb').classList.toggle('active', tab === 'thumb');
  document.getElementById('tab-detail').classList.toggle('active', tab === 'detail');
  const q = document.getElementById('searchInput').value;
  if (q.trim()) search(q);
}
</script>
</body>
</html>
