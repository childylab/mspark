<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 검증</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f23;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
h1 { font-size: 22px; margin-bottom: 32px; color: #ccc; font-weight: 500; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  max-width: 760px;
  width: 100%;
}
.card {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  padding: 24px 20px;
  text-decoration: none;
  color: #fff;
  transition: all .2s ease;
}
.card:hover {
  border-color: #4fc3f7;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(79,195,247,.12);
}
.card h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.card p { font-size: 12px; color: #888; }
</style>
</head>
<body>
<h1>상품 검증</h1>
<div class="grid">
  <a href="odp_batch_detail_test.html" class="card">
    <h2>ODP 26FA</h2>
    <p>86개</p>
  </a>
  <a href="univ_batch_detail_test.html" class="card">
    <h2>UNIV 26FA</h2>
    <p>16개</p>
  </a>
  <a href="uo_batch_detail_test.html" class="card">
    <h2>UO 26FA</h2>
    <p>6개</p>
  </a>
  <a href="oh_batch_detail_test.html" class="card">
    <h2>OH 26FA</h2>
    <p>2개</p>
  </a>
</div>
</body>
</html>
