<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODP 26FA 검증</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

#sidebar {
  position: fixed; top: 0; left: 0; width: 200px; bottom: 0;
  background: #1a1a2e; overflow-y: auto; padding: 16px 0; z-index: 900;
}
#sidebar .logo { padding: 0 14px 12px; font-size: 13px; color: #4fc3f7; font-weight: 700; }
#sidebar .logo a { color: #888; text-decoration: none; font-size: 11px; font-weight: 400; }
#sidebar .tabs { padding: 0 8px 12px; display: flex; gap: 4px; }
#sidebar .tabs button {
  flex: 1; padding: 7px 0; border: none; border-radius: 4px;
  background: #2a2a4a; color: #8ab4f8; font-size: 11px; font-weight: 600; cursor: pointer;
}
#sidebar .tabs button.active { background: #4fc3f7; color: #000; }
#sidebar .nav-group { padding: 8px 0; }
#sidebar .group-label { color: #4fc3f7; font-weight: 700; font-size: 10px; padding: 6px 14px 2px; text-transform: uppercase; }
#sidebar a { display: block; padding: 4px 14px; color: #aab; text-decoration: none; font-size: 11px; border-left: 3px solid transparent; }
#sidebar a:hover { color: #fff; border-left-color: #4fc3f7; background: rgba(255,255,255,.03); }

#main { margin-left: 200px; padding: 24px; max-width: 1000px; }

.stats {
  display: flex; gap: 12px; margin-bottom: 20px; font-size: 13px; font-weight: 600;
}
.stats .s { padding: 6px 14px; border-radius: 6px; }
.stats .s.total { background: #e3e3e3; }
.stats .s.ok { background: #c8e6c9; color: #2e7d32; }
.stats .s.fail { background: #ffcdd2; color: #c62828; }

#failPanel { display: none; background: #fff3f3; border: 1px solid #e53935; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; max-height: 150px; overflow-y: auto; font-size: 11px; }
#failPanel.show { display: block; }
#failPanel h4 { color: #c62828; font-size: 12px; margin-bottom: 4px; }
#failPanel .fail-item { color: #555; padding: 1px 0; word-break: break-all; }

.card { background: #fff; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
.card-header { padding: 10px 14px; background: #263238; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
.card-header:hover { background: #37474f; }
.card-header .pum { font-weight: 700; color: #80cbc4; }
.card-header .color { color: #ffcc80; margin-left: 6px; }
.card-header .name { color: #cfd8dc; margin-left: 6px; }
.card-header .toggle { font-size: 14px; transition: transform .2s; }
.card-header.collapsed .toggle { transform: rotate(-90deg); }
.card-body { padding: 8px; text-align: center; }
.card-body.hidden { display: none; }
.card-body img { display: block; width: 100%; max-width: 800px; margin: 0 auto; border: 2px solid #e0e0e0; }
.card-body img.loaded { border-color: #4caf50; }
.card-body img.error { border-color: #f44336; }

.thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 8px; }
.thumb-item { text-align: center; }
.thumb-item img { width: 100%; max-width: 160px; border: 2px solid #e0e0e0; border-radius: 4px; }
.thumb-item img.loaded { border-color: #4caf50; }
.thumb-item img.error { border-color: #f44336; }
.thumb-item .label { font-size: 10px; color: #666; margin-top: 3px; word-break: break-all; }
.thumb-size-label { font-weight: 700; font-size: 11px; color: #1a1a2e; padding: 6px 0 3px; border-bottom: 1px solid #eee; margin-bottom: 6px; }
</style>
</head>
<body>
<div id="sidebar">
  <div class="logo">ODP 26FA <a href="index.html">← 메인</a></div>
  <div class="tabs">
    <button class="active" data-tab="detail">상품상세</button>
    <button data-tab="thumb">썸네일</button>
  </div>
  <div id="nav"></div>
</div>
<div id="main">
  <div class="stats">
    <span class="s total">전체 <span id="cntTotal">0</span></span>
    <span class="s ok">성공 <span id="cntOk">0</span></span>
    <span class="s fail">실패 <span id="cntFail">0</span></span>
  </div>
  <div id="failPanel"><h4>❌ 실패 URL</h4><div id="failList"></div></div>
  <div id="content"></div>
</div>

<script>
const BASE = 'https://img.childy.kr/img/outdoor2026/odp26_FA/';
const THUMB_BASE = 'https://img.childy.kr/img/outdoor2026/odp26_FA/thum/';

const COMMON_IMGS = [
  'https://img.childy.kr/img/outdoor2023/notice/top_notice_odp.jpg',
  BASE + '2026FA_intro.jpg',
  'https://img.childy.kr/img/outdoor2024/odp24_FA/kc.jpg',
  BASE + 'modelspec.jpg',
  'https://img.childy.kr/img/outdoor2024/odp24_FA/size.jpg',
  'https://img.childy.kr/img/outdoor2024/odp24_SP/washingtip.jpg',
  'https://img.childy.kr/img/outdoor2024/odp24_SP/delivery.jpg'
];

const MODEL_C_SET = new Set([
  'OD263ILS01_NVY','OD263ILS02_LKH','OD263ILS03_BLU','OD263ILS04_CML',
  'OD263ILS04_MLG','OD263ILS05_IVY','OD263ILS06_LGN','OD263ILC07_BRN',
  'OD263ILS08_MUS','OD263IHD01_MWH','OD263IHD01_KHA','OD263ILS09_OTM',
  'OD263IMM02_OTM','OD263IMM03_MLG','OD263IZM04_BLU','OD263IHD05_MLG',
  'OD263IHD05_BLK','OD263IZM71_OTM','OD263IMM72_BRN','OD263IHZ73_PNK',
  'OD263IHD75_OTM','OD263BPT01_MLG','OD263BPT01_OTM','OD263BPT01_NVY',
  'OD263BPT01_BLK','OD263BPT02_LBE','OD263BPT03_MWH','OD263BPT03_MLG',
  'OD263BPT03_BLK','OD263BPT04_OTM','OD263BPT04_BLK','OD263BPT05_BEI',
  'OD263BPT05_CHC','OD263BPT06_BRN','OD263BPT06_KHA','OD263BPT06_BLK',
  'OD263ISH06_BRN','OD263ISH06_NVY',
  'OD263BPT07_CRE','OD263BPT73_PNK','OD263BPT74_MLG','OD263BPT74_OTM'
]);

const PRODUCTS = [
  ['OD263ILS01','BLU','멀티 스트라이프 티셔츠'],['OD263ILS01','NVY','멀티 스트라이프 티셔츠'],['OD263ILS01','BRN','멀티 스트라이프 티셔츠'],
  ['OD263ILS02','LKH','단스트라이프 티셔츠'],['OD263ILS02','DGY','단스트라이프 티셔츠'],
  ['OD263ILS03','BLU','배색 레이어드 티셔츠'],['OD263ILS03','BLK','배색 레이어드 티셔츠'],
  ['OD263ILS04','OWH','소매 그래픽 티셔츠'],['OD263ILS04','CML','소매 그래픽 티셔츠'],['OD263ILS04','MLG','소매 그래픽 티셔츠'],['OD263ILS04','BLK','소매 그래픽 티셔츠'],
  ['OD263ILS05','IVY','전면 그래픽 티셔츠'],['OD263ILS05','BLU','전면 그래픽 티셔츠'],['OD263ILS05','BLK','전면 그래픽 티셔츠'],
  ['OD263ILS06','MWH','백 그래픽 티셔츠'],['OD263ILS06','LGN','백 그래픽 티셔츠'],['OD263ILS06','DGY','백 그래픽 티셔츠'],
  ['OD263ILC07','BLU','멀티스트라이프 럭비티셔츠'],['OD263ILC07','BRN','멀티스트라이프 럭비티셔츠'],
  ['OD263ILS08','MUS','라글란 그래픽 티셔츠'],['OD263ILS08','DGY','라글란 그래픽 티셔츠'],['OD263ILS08','BLK','라글란 그래픽 티셔츠'],
  ['OD263IHD01','MWH','레이어드 후드티'],['OD263IHD01','KHA','레이어드 후드티'],
  ['OD263ILS09','OTM','베이직 긴팔티'],['OD263ILS09','MLG','베이직 긴팔티'],['OD263ILS09','GRY','베이직 긴팔티'],
  ['OD263IMM02','OTM','전면 그래픽 맨투맨'],['OD263IMM02','LBL','전면 그래픽 맨투맨'],['OD263IMM02','BLK','전면 그래픽 맨투맨'],
  ['OD263IMM03','CRE','백 그래픽 맨투맨'],['OD263IMM03','NVY','백 그래픽 맨투맨'],['OD263IMM03','MLG','백 그래픽 맨투맨'],
  ['OD263IZM04','BLU','컬러블록 반집맨투맨'],['OD263IZM04','PNK','컬러블록 반집맨투맨'],['OD263IZM04','BLK','컬러블록 반집맨투맨'],
  ['OD263IHD05','MLG','전면 그래픽 후드티'],['OD263IHD05','BLK','전면 그래픽 후드티'],
  ['OD263ISH06','BRN','플란넬 체크셔츠'],['OD263ISH06','NVY','플란넬 체크셔츠'],
  ['OD263BPT01','MLG','에센셜 조거팬츠'],['OD263BPT01','OTM','에센셜 조거팬츠'],['OD263BPT01','NVY','에센셜 조거팬츠'],['OD263BPT01','BLK','에센셜 조거팬츠'],
  ['OD263BPT02','LBE','커브드 저지팬츠'],['OD263BPT02','MLG','커브드 저지팬츠'],['OD263BPT02','BLK','커브드 저지팬츠'],
  ['OD263BPT03','MWH','카고 조거 저지팬츠'],['OD263BPT03','MLG','카고 조거 저지팬츠'],['OD263BPT03','BLK','카고 조거 저지팬츠'],
  ['OD263BPT04','OTM','배색 스트레이트 저지팬츠'],['OD263BPT04','BRN','배색 스트레이트 저지팬츠'],['OD263BPT04','BLK','배색 스트레이트 저지팬츠'],
  ['OD263BPT05','BEI','세미배기 우븐팬츠'],['OD263BPT05','CHC','세미배기 우븐팬츠'],
  ['OD263BPT06','BRN','카고 우븐팬츠'],['OD263BPT06','KHA','카고 우븐팬츠'],['OD263BPT06','BLK','카고 우븐팬츠'],
  ['OD263BPT07','CRE','코듀로이 카고팬츠'],['OD263BPT07','DBL','코듀로이 카고팬츠'],['OD263BPT07','BLK','코듀로이 카고팬츠'],
  ['OD263IZM71','MLG','여아 반집 맨투맨'],['OD263IZM71','OTM','여아 반집 맨투맨'],
  ['OD263IMM72','BRN','여아 그래픽 크롭 맨투맨'],['OD263IMM72','BLK','여아 그래픽 크롭 맨투맨'],
  ['OD263IHZ73','PNK','여아 벨로아 후드집업'],['OD263IHZ73','MLG','여아 벨로아 후드집업'],
  ['OD263BPT73','PNK','여아 벨로아 팬츠'],['OD263BPT73','MLG','여아 벨로아 팬츠'],
  ['OD263IHD75','MLG','여아 크롭 후드티셔츠'],['OD263IHD75','OTM','여아 크롭 후드티셔츠'],
  ['OD263BPT74','MLG','여아 백그래픽 저지팬츠'],['OD263BPT74','OTM','여아 백그래픽 저지팬츠']
];

const THUMB_SIZES = ['ERP','750','800','960','1000','1500','ERP_ALL'];
let totalImgs=0, okImgs=0, failImgs=0, currentTab='detail';

function updateStats(){ document.getElementById('cntTotal').textContent=totalImgs; document.getElementById('cntOk').textContent=okImgs; document.getElementById('cntFail').textContent=failImgs; }
function addFail(url){ document.getElementById('failPanel').classList.add('show'); const d=document.createElement('div'); d.className='fail-item'; d.textContent=url; document.getElementById('failList').appendChild(d); }
function resetStats(){ totalImgs=0;okImgs=0;failImgs=0; updateStats(); document.getElementById('failList').innerHTML=''; document.getElementById('failPanel').classList.remove('show'); }

function createImg(src){ totalImgs++; const img=document.createElement('img'); img.src=src; img.alt=src.split('/').pop(); img.onload=function(){this.classList.add('loaded');okImgs++;updateStats();}; img.onerror=function(){this.classList.add('error');failImgs++;updateStats();addFail(src);}; return img; }

function getDetailImages(pum,color){ const key=pum+'_'+color; const has=MODEL_C_SET.has(key); const imgs=[]; imgs.push(COMMON_IMGS[0],COMMON_IMGS[1],BASE+pum+'_txt.jpg'); if(has)imgs.push(BASE+key+'_model_c.jpg'); imgs.push(BASE+key+'_model.jpg',BASE+key+'_prd.jpg',BASE+key+'_detail.jpg',COMMON_IMGS[2],COMMON_IMGS[3],COMMON_IMGS[4],BASE+pum+'_size.jpg',BASE+pum+'_check.jpg',COMMON_IMGS[5],COMMON_IMGS[6]); return imgs; }
function getThumbUrls(pum,color){ const key=pum+'_'+color; return {'ERP':THUMB_BASE+key+'.jpg','750':THUMB_BASE+key+'_750.jpg','800':THUMB_BASE+key+'_800.jpg','960':THUMB_BASE+key+'_960.jpg','1000':THUMB_BASE+key+'_1000.jpg','1500':THUMB_BASE+key+'_1500.jpg','ERP_ALL':THUMB_BASE+pum+'_ALL.jpg'}; }

function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  const seen=new Set();
  PRODUCTS.forEach((p,i)=>{ const[pum,color]=p; if(!seen.has(pum)){seen.add(pum); const l=document.createElement('div');l.className='group-label';l.textContent=pum;nav.appendChild(l);} const a=document.createElement('a');a.href='#card-'+i;a.textContent=color;nav.appendChild(a); });
}

function buildDetail(){
  const ct=document.getElementById('content'); ct.innerHTML=''; resetStats();
  const seen=new Set();
  PRODUCTS.forEach((p,i)=>{ const[pum,color,name]=p; const first=!seen.has(pum); if(first)seen.add(pum); const collapsed=!first;
    const card=document.createElement('div');card.className='card';card.id='card-'+i;
    const h=document.createElement('div');h.className='card-header'+(collapsed?' collapsed':''); h.innerHTML=`<div><span class="pum">${pum}</span><span class="color">${color}</span><span class="name">${name}</span></div><span class="toggle">▼</span>`;
    const b=document.createElement('div');b.className='card-body'+(collapsed?' hidden':'');
    getDetailImages(pum,color).forEach(s=>b.appendChild(createImg(s)));
    h.onclick=()=>{b.classList.toggle('hidden');h.classList.toggle('collapsed');};
    card.appendChild(h);card.appendChild(b);ct.appendChild(card);
  }); updateStats();
}

function buildThumb(){
  const ct=document.getElementById('content'); ct.innerHTML=''; resetStats();
  const seen=new Set();
  PRODUCTS.forEach((p,i)=>{ const[pum,color,name]=p; const first=!seen.has(pum); if(first)seen.add(pum); const collapsed=!first;
    const card=document.createElement('div');card.className='card';card.id='card-'+i;
    const h=document.createElement('div');h.className='card-header'+(collapsed?' collapsed':''); h.innerHTML=`<div><span class="pum">${pum}</span><span class="color">${color}</span><span class="name">${name}</span></div><span class="toggle">▼</span>`;
    const b=document.createElement('div');b.className='card-body'+(collapsed?' hidden':'');
    const thumbs=getThumbUrls(pum,color); const grid=document.createElement('div');grid.className='thumb-grid';
    THUMB_SIZES.forEach(sz=>{ const item=document.createElement('div');item.className='thumb-item'; const sl=document.createElement('div');sl.className='thumb-size-label';sl.textContent=sz;item.appendChild(sl); item.appendChild(createImg(thumbs[sz])); const lb=document.createElement('div');lb.className='label';lb.textContent=thumbs[sz].split('/').pop();item.appendChild(lb); grid.appendChild(item); });
    b.appendChild(grid);
    h.onclick=()=>{b.classList.toggle('hidden');h.classList.toggle('collapsed');};
    card.appendChild(h);card.appendChild(b);ct.appendChild(card);
  }); updateStats();
}

document.querySelectorAll('#sidebar .tabs button').forEach(btn=>{
  btn.onclick=()=>{ document.querySelectorAll('#sidebar .tabs button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentTab=btn.dataset.tab; if(currentTab==='detail')buildDetail();else buildThumb(); };
});
buildNav(); buildDetail();
</script>
</body>
</html>
