<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIV 26FA 검증</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

#sidebar {
  position: fixed; top: 0; left: 0; width: 200px; bottom: 0;
  background: #1a1a2e; overflow-y: auto; padding: 16px 0; z-index: 900;
}
#sidebar .logo { padding: 0 14px 12px; font-size: 13px; color: #4fc3f7; font-weight: 700; }
#sidebar .logo a { color: #888; text-decoration: none; font-size: 11px; font-weight: 400; }
#sidebar .tabs { padding: 0 8px 12px; display: flex; gap: 4px; }
#sidebar .tabs button {
  flex: 1; padding: 7px 0; border: none; border-radius: 4px;
  background: #2a2a4a; color: #8ab4f8; font-size: 11px; font-weight: 600; cursor: pointer;
}
#sidebar .tabs button.active { background: #4fc3f7; color: #000; }
#sidebar .nav-group { padding: 8px 0; }
#sidebar .group-label { color: #4fc3f7; font-weight: 700; font-size: 10px; padding: 6px 14px 2px; text-transform: uppercase; }
#sidebar a { display: block; padding: 4px 14px; color: #aab; text-decoration: none; font-size: 11px; border-left: 3px solid transparent; }
#sidebar a:hover { color: #fff; border-left-color: #4fc3f7; background: rgba(255,255,255,.03); }

#main { margin-left: 200px; padding: 24px; display: flex; flex-direction: column; align-items: center; }

.stats {
  position: sticky; top: 0; z-index: 100; background: #f5f5f5;
  display: flex; gap: 12px; padding: 12px 0; margin-bottom: 16px; font-size: 13px; font-weight: 600; align-items: center;
}
.stats .s { padding: 6px 14px; border-radius: 6px; }
.stats .s.total { background: #e3e3e3; }
.stats .s.ok { background: #c8e6c9; color: #2e7d32; }
.stats .s.fail { background: #ffcdd2; color: #c62828; }
.stats .collapse-all { margin-left: auto; padding: 5px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-size: 11px; cursor: pointer; color: #555; }
.stats .collapse-all:hover { background: #eee; }

#failPanel { display: none; background: #fff3f3; border: 1px solid #e53935; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; max-height: 150px; overflow-y: auto; font-size: 11px; }
#failPanel.show { display: block; }
#failPanel h4 { color: #c62828; font-size: 12px; margin-bottom: 4px; }
#failPanel .fail-item { color: #555; padding: 1px 0; word-break: break-all; }

.card { width: 100%; background: #fff; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; max-width: 860px; margin-left: auto; margin-right: auto; }
.card-header { padding: 10px 14px; background: #263238; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
.card-header:hover { background: #37474f; }
.card-header .pum { font-weight: 700; color: #80cbc4; }
.card-header .color { color: #ffcc80; margin-left: 6px; }
.card-header .name { color: #cfd8dc; margin-left: 6px; }
.card-header .toggle { font-size: 14px; transition: transform .2s; }
.card-header.collapsed .toggle { transform: rotate(-90deg); }
.card-body { padding: 8px; text-align: center; }
.card-body.hidden { display: none; }
.card-body img { display: block; width: 100%; max-width: 800px; margin: 0 auto; border: 2px solid #e0e0e0; }
.card-body img.loaded { border-color: #e0e0e0; }
.card-body img.error { border-color: #f44336; }

.thumb-grid { padding: 8px; } .thumb-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; } .thumb-row .thumb-item { flex: 0 0 auto; width: 150px; }
.thumb-item { text-align: center; }
.thumb-item img { width: 100%; max-width: 160px; border: 2px solid #e0e0e0; border-radius: 4px; }
.thumb-item img.loaded { border-color: #e0e0e0; }
.thumb-item img.error { border-color: #f44336; }
.thumb-item .label { font-size: 10px; color: #666; margin-top: 3px; word-break: break-all; }
.thumb-size-label { font-weight: 700; font-size: 11px; color: #1a1a2e; padding: 12px 0 6px; border-top: 2px solid #ddd; margin-top: 12px; grid-column: 1 / -1; }
</style>
</head>
<body>
<div id="sidebar">
  <div class="logo">UNIV 26FA <a href="index.html">← 메인</a></div>
  <div class="tabs">
    <button class="active" data-tab="detail">상품상세</button>
    <button data-tab="thumb">썸네일</button>
  </div>
  <div id="nav"></div>
</div>
<div id="main">
  <div class="stats">
    <span class="s total">전체 <span id="cntTotal">0</span></span>
    <span class="s ok">성공 <span id="cntOk">0</span></span>
    <span class="s fail">실패 <span id="cntFail">0</span></span>
    <button class="collapse-all" onclick="collapseAll()">모든 탭 닫기</button>
  </div>
  <div id="failPanel"><h4>❌ 실패 URL</h4><div id="failList"></div></div>
  <div id="content"></div>
</div>

<script>
const BASE = 'https://img.childy.kr/img/univ/univ26_FA/';
const THUMB_BASE = 'https://img.childy.kr/img/univ/univ26_FA/thum/';
const BRAND_BASE = 'https://img.childy.kr/img/univ/';

const COMMON_IMGS = [
  BRAND_BASE + 'top_notice_univ.jpg',
  BASE + 'intro_26fw.jpg',
  BASE + 'modelspec.jpg',
  BRAND_BASE + 'sizeguide.jpg',
  BRAND_BASE + 'kc.jpg',
  BRAND_BASE + 'washingtip.jpg',
  BRAND_BASE + 'delivery.jpg'
];

const PRODUCTS = [
  ['UV263ILS01','MLG','유니 로고 긴팔티셔츠'],
  ['UV263ILS01','IVY','유니 로고 긴팔티셔츠'],
  ['UV263ILS01','NVY','유니 로고 긴팔티셔츠'],
  ['UV263ILS02','OWH','크랙 백그래픽 긴팔티셔츠'],
  ['UV263ILS02','BLK','크랙 백그래픽 긴팔티셔츠'],
  ['UV263ILS02','CHC','크랙 백그래픽 긴팔티셔츠'],
  ['UV263IZM03','OTM','헨리넥 아치 맨투맨'],
  ['UV263IZM03','GRN','헨리넥 아치 맨투맨'],
  ['UV263IMM04','MLG','래글런 그래픽 맨투맨'],
  ['UV263IMM04','NVY','래글런 그래픽 맨투맨'],
  ['UV263IHD05','IVY','클럽 그래픽 후드'],
  ['UV263IHD05','KHA','클럽 그래픽 후드'],
  ['UV263BPT01','MWH','베이직 로고 조거팬츠'],
  ['UV263BPT01','NVY','베이직 로고 조거팬츠'],
  ['UV263BPT02','MLG','베이직 로고 커브드팬츠'],
  ['UV263BPT02','BLK','베이직 로고 커브드팬츠']
];

const THUMB_SIZES = ['ERP','750','800','1000','1500','ERP_ALL'];
let totalImgs=0, okImgs=0, failImgs=0, currentTab='detail';

function updateStats(){ document.getElementById('cntTotal').textContent=totalImgs; document.getElementById('cntOk').textContent=okImgs; document.getElementById('cntFail').textContent=failImgs; }
function addFail(url){ document.getElementById('failPanel').classList.add('show'); const d=document.createElement('div'); d.className='fail-item'; d.textContent=url; document.getElementById('failList').appendChild(d); }
function resetStats(){ totalImgs=0;okImgs=0;failImgs=0; updateStats(); document.getElementById('failList').innerHTML=''; document.getElementById('failPanel').classList.remove('show'); }

function createImg(src){ totalImgs++; const img=document.createElement('img'); img.src=src; img.alt=src.split('/').pop(); img.onload=function(){this.classList.add('loaded');okImgs++;updateStats();}; img.onerror=function(){this.classList.add('error');failImgs++;updateStats();addFail(src);}; return img; }

function getDetailImages(pum,color){
  const key = pum+'_'+color;
  return [
    COMMON_IMGS[0],
    COMMON_IMGS[1],
    BASE+pum+'_txt.jpg',
    BASE+pum+'_model.jpg',
    BASE+key+'_model.jpg',
    BASE+key+'_detail.jpg',
    BASE+pum+'_info.jpg',
    BASE+pum+'_size.jpg',
    COMMON_IMGS[2],
    COMMON_IMGS[3],
    COMMON_IMGS[4],
    COMMON_IMGS[5],
    COMMON_IMGS[6]
  ];
}

function getThumbUrls(pum,color){
  const key = pum+'_'+color;
  return {
    'ERP': THUMB_BASE+key+'.jpg',
    '750': THUMB_BASE+key+'_750.jpg',
    '800': THUMB_BASE+key+'_800.jpg',
    '1000': THUMB_BASE+key+'_1000.jpg',
    '1500': THUMB_BASE+key+'_1500.jpg',
    'ERP_ALL': THUMB_BASE+pum+'_ALL.jpg'
  };
}

function collapseAll(){ document.querySelectorAll('.card-body').forEach(b=>b.classList.add('hidden')); document.querySelectorAll('.card-header').forEach(h=>h.classList.add('collapsed')); }

function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  const seen=new Set();
  PRODUCTS.forEach((p,i)=>{ const[pum,color]=p; if(!seen.has(pum)){seen.add(pum); const l=document.createElement('div');l.className='group-label';l.textContent=pum;nav.appendChild(l);} const a=document.createElement('a');a.href='#card-'+i;a.textContent=color;nav.appendChild(a); });
}

function buildDetail(){
  const ct=document.getElementById('content'); ct.innerHTML=''; resetStats();
  const seen=new Set();
  PRODUCTS.forEach((p,i)=>{ const[pum,color,name]=p; const first=!seen.has(pum); if(first)seen.add(pum); const collapsed=!first;
    const card=document.createElement('div');card.className='card';card.id='card-'+i;
    const h=document.createElement('div');h.className='card-header'+(collapsed?' collapsed':''); h.innerHTML=`<div><span class="pum">${pum}</span><span class="color">${color}</span><span class="name">${name}</span></div><span class="toggle">▼</span>`;
    const b=document.createElement('div');b.className='card-body'+(collapsed?' hidden':'');
    getDetailImages(pum,color).forEach(s=>b.appendChild(createImg(s)));
    h.onclick=()=>{b.classList.toggle('hidden');h.classList.toggle('collapsed');};
    card.appendChild(h);card.appendChild(b);ct.appendChild(card);
  }); updateStats();
}

function buildThumb(){
  const ct=document.getElementById('content'); ct.innerHTML=''; resetStats();
  const seen=new Set();
  PRODUCTS.forEach((p,i)=>{ const[pum,color,name]=p; const first=!seen.has(pum); if(first)seen.add(pum); const collapsed=!first;
    const card=document.createElement('div');card.className='card';card.id='card-'+i;
    const h=document.createElement('div');h.className='card-header'+(collapsed?' collapsed':''); h.innerHTML=`<div><span class="pum">${pum}</span><span class="color">${color}</span><span class="name">${name}</span></div><span class="toggle">▼</span>`;
    const b=document.createElement('div');b.className='card-body'+(collapsed?' hidden':'');
    const thumbs=getThumbUrls(pum,color); const grid=document.createElement('div');grid.className='thumb-grid';
    THUMB_SIZES.forEach(sz=>{ const sl=document.createElement('div');sl.className='thumb-size-label';sl.textContent=sz;grid.appendChild(sl); const row=document.createElement('div');row.className='thumb-row'; const item=document.createElement('div');item.className='thumb-item'; item.appendChild(createImg(thumbs[sz])); const lb=document.createElement('div');lb.className='label';lb.textContent=thumbs[sz].split('/').pop();item.appendChild(lb); row.appendChild(item); grid.appendChild(row); });
    b.appendChild(grid);
    h.onclick=()=>{b.classList.toggle('hidden');h.classList.toggle('collapsed');};
    card.appendChild(h);card.appendChild(b);ct.appendChild(card);
  }); updateStats();
}

document.querySelectorAll('#sidebar .tabs button').forEach(btn=>{
  btn.onclick=()=>{ document.querySelectorAll('#sidebar .tabs button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentTab=btn.dataset.tab; if(currentTab==='detail')buildDetail();else buildThumb(); };
});
buildNav(); buildDetail();
</script>
</body>
</html>
